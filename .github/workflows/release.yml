name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.5'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build plugin
        run: ./gradlew clean buildPlugin --no-daemon

      - name: Verify plugin
        run: ./gradlew verifyPlugin --no-daemon

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/libs/*.jar
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "Release ${{ steps.get_version.outputs.version }}"
          body: |
            ### OSV Vulnerability Scanner Plugin v${{ steps.get_version.outputs.version }}
            
            [![OSV Plugin](https://img.shields.io/badge/OSV-Vulnerability%20Scanner-blue)](https://github.com/dyuti/jetbrains-osv-plugin)
            [![IntelliJ Platform](https://img.shields.io/badge/IntelliJ-IDEA-00bcb8)](https://www.jetbrains.com/idea/)
            
            A free, open-source IntelliJ IDEA plugin that provides security vulnerability scanning for open-source dependencies using the OSV (Open Source Vulnerabilities) database.
            
            ## ✨ Features
            
            ### Core Features
            - 🔍 **Real-time Vulnerability Scanning** - Instant feedback on dependency vulnerabilities
            - 📋 **License Detection** - Detect and analyze open source licenses
            - 🏷️ **License Compliance** - Check for license conflicts and restrictions
            - 📊 **SARIF Export** - Export findings in SARIF v2.1.0 format
            - 🔄 **Multi-DB Support** - Query OSV, NVD, and GitHub Advisory databases
            - 🌿 **Branch Comparison** - Compare vulnerabilities across branches
            
            ### Advanced Features
            - 🎯 **Organization Management** - Multi-tenant support with teams
            - 📝 **Jira Integration** - Create Jira issues from vulnerabilities
            - 🔧 **Quick Fixes** - Suggested remediation actions
            - 💡 **Context Help** - Snyk Learn-style help links
            - 📈 **Custom Policies** - Define your own security policies
            
            ## 📦 Installation
            
            ### From GitHub Releases
            1. Download the latest `.jar` file from [Releases](https://github.com/dyuti/jetbrains-osv-plugin/releases)
            2. Open IntelliJ IDEA
            3. Go to **Settings/Preferences → Plugins**
            4. Click the gear icon → **Install Plugin from Disk**
            5. Select the downloaded `.jar` file
            6. Restart IntelliJ IDEA
            
            ### From Settings
            1. Open IntelliJ IDEA
            2. Go to **Settings/Preferences → Plugins**
            3. Click the settings icon ⚙️ → **Manage Plugin Repositories...**
            4. Add: `https://plugins.jetbrains.com/plugins/list?pluginId=XXXXX` (TBD)
            5. Search for "OSV Vulnerability Scanner"
            6. Click Install
            
            ## ⚙️ Configuration
            
            After installation, configure the plugin via **Settings/Preferences → OSV Scanner**:
            
            - **Minimum Severity**: Set threshold for vulnerability notifications
            - **Cache TTL**: Configure local cache expiration
            - **Rate Limiting**: Set request limits to OSV API
            - **GitHub Token**: Optional token for GitHub Advisory DB access
            - **License Scanning**: Enable license detection
            - **Jira Integration**: Configure Jira connection for issue creation
            
            ## 📋 Requirements
            
            - IntelliJ IDEA 2019.3 or later (Community or Ultimate)
            - Java 17 or later
            - Gradle 6.8+ or Maven 3.6+ (for dependency resolution)
            
            ## 🌐 Supported Ecosystems
            
            | Ecosystem | Package Manager | Supported |
            |-----------|----------------|-----------|
            | Java | Maven (pom.xml) | ✅ |
            | Java | Gradle (build.gradle) | ✅ |
            | JavaScript | npm (package.json) | ✅ |
            | Python | pip (requirements.txt) | ✅ |
            
            ## 🔒 License
            
            This project is licensed under the [Apache 2.0 License](LICENSE).
            
            ## 🙏 Acknowledgments
            
            - [OSV Database](https://osv.dev/) - Free, open-source vulnerability database
            - [JetBrains IntelliJ Platform](https://www.jetbrains.com/idea/) - SDK for plugin development
            - [Snyk](https://snyk.io/) - Inspiration for security scanning features
            
            ## 📞 Support
            
            - [GitHub Issues](https://github.com/dyuti/jetbrains-osv-plugin/issues) - Bug reports and feature requests
            - [GitHub Discussions](https://github.com/dyuti/jetbrains-osv-plugin/discussions) - Community support
            - [Documentation](https://github.com/dyuti/jetbrains-osv-plugin/wiki) - User guide and API docs
            
            ---
            
            _Made with ❤️ by the OSV Plugin Team_
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload plugin to releases
        run: |
          echo "Release created successfully!"
          echo "Plugin available at: https://github.com/dyuti/jetbrains-osv-plugin/releases/tag/${{ steps.get_version.outputs.version }}"
