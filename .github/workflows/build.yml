name: Build and Release OSV Plugin

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for release (e.g., v1.0.0)"
        required: false
        default: "v0.0.0"

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest
    strategy:
      matrix:
        intellij-version: ["2023.3", "2024.1"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: "8.5"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build plugin with Gradle
        run: ./gradlew buildPlugin -PintellijVersion=${{ matrix.intellij-version }} --no-daemon

      - name: Verify artifact naming
        run: |
          ls build/distributions/*.zip
          if [ ! -f build/distributions/jetbrains-osv-plugin-*.zip ]; then
            echo "ERROR: Artifact does not follow osv-plugin-{version}.zip naming convention"
            exit 1
          fi
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: osv-plugin-${{ matrix.intellij-version }}
          path: build/distributions/*.zip
          retention-days: 7

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: "8.5"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests
          retention-days: 7

  verify:
    name: Verify Plugin
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: "8.5"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify plugin
        run: ./gradlew verifyPlugin --no-daemon

      - name: Check build report
        run: |
          if [ -f "build/reports/verify-plugin/verify-plugin-report.txt" ]; then
            echo "=== Plugin Verification Report ==="
            cat build/reports/verify-plugin/verify-plugin-report.txt
          else
            echo "Verification report not found"
          fi

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, test, verify]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: "8.5"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release artifact
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ./gradlew buildPlugin -PpluginVersion=$VERSION --no-daemon

      - name: Verify artifact naming
        run: |
          ls build/distributions/*.zip
          if [ ! -f build/distributions/jetbrains-osv-plugin-*.zip ]; then
            echo "ERROR: Artifact does not follow osv-plugin-{version}.zip naming convention"
            exit 1
          fi
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/distributions/*.zip
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "Release ${{ steps.get_version.outputs.version }}"
          body: |
            ### OSV Vulnerability Scanner Plugin

            ### Installation
            1. Open IntelliJ IDEA
            2. Go to Settings/Preferences → Plugins
            3. Click the gear icon → Install Plugin from Disk
            4. Select the downloaded `.zip` file
            5. Restart IntelliJ IDEA

            ### Features
            - Real-time vulnerability scanning for Maven, Gradle, npm, and pip dependencies
            - License detection and compliance checking
            - SARIF export for compliance reporting
            - Multi-database support (OSV, NVD, GitHub Advisory)
            - Branch comparison to highlight new issues

            ### Requirements
            - IntelliJ IDEA 2023.3 or later
            - Java 17 or later

            ### License
            Apache 2.0
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to JetBrains Marketplace
    runs-on: ubuntu-latest
    needs: [build, test, verify]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: "8.5"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release artifact for publish
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ./gradlew buildPlugin -PpluginVersion=$VERSION --no-daemon

      - name: Verify artifact naming
        run: |
          ls build/distributions/*.zip
          if [ ! -f build/distributions/jetbrains-osv-plugin-*.zip ]; then
            echo "ERROR: Artifact does not follow osv-plugin-{version}.zip naming convention"
            exit 1
          fi
      - name: Publish to Marketplace
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # publishPlugin requires IntelliJ Gradle Plugin 1.17.3+ or 2.x.
          # With 1.17.0, use the JetBrains Marketplace web UI for upload.
          # Uncomment below when plugin version is upgraded:
          # ./gradlew publishPlugin -PpluginVersion=$VERSION -PintellijPublishToken=${{ secrets.JETBRAINS_TOKEN }} --no-daemon
          echo "Automated publish requires IntelliJ Gradle Plugin 1.17.3+. Upload manually or upgrade build tool."

  release-draft:
    name: Draft Release (Main Branch)
    runs-on: ubuntu-latest
    needs: [build, test, verify]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: "8.5"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build draft artifact
        run: |
          VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)
          ./gradlew buildPlugin -PpluginVersion=$VERSION --no-daemon

      - name: Upload artifact for manual marketplace upload
        uses: actions/upload-artifact@v4
        with:
          name: osv-plugin-release
          path: build/distributions/*.zip

  build-snapshot:
    name: Build Snapshot
    runs-on: ubuntu-latest
    needs: [build, test, verify]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: "8.5"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build snapshot artifact
        run: |
          VERSION="snapshot-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          ./gradlew buildPlugin -PpluginVersion=$VERSION --no-daemon

      - name: Verify artifact naming
        run: |
          ls build/distributions/*.zip
          if [ ! -f build/distributions/jetbrains-osv-plugin-*.zip ]; then
            echo "ERROR: Artifact does not follow osv-plugin-{version}.zip naming convention"
            exit 1
          fi
      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: osv-plugin-snapshot
          path: build/distributions/*.zip
          retention-days: 30
