name: Build and Release OSV Plugin

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for release (e.g., v1.0.0)'
        required: false
        default: 'v0.0.0'

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.5'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build plugin with Gradle
        run: ./gradlew buildPlugin --no-daemon

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: osv-plugin
          path: build/libs/*.jar
          retention-days: 7

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.5'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests
          retention-days: 7

  verify:
    name: Verify Plugin
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.5'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify plugin
        run: ./gradlew verifyPlugin --no-daemon

      - name: Check build report
        run: |
          if [ -f "build/reports/verify-plugin/verify-plugin-report.txt" ]; then
            echo "=== Plugin Verification Report ==="
            cat build/reports/verify-plugin/verify-plugin-report.txt
          else
            echo "Verification report not found"
          fi

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, test, verify]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: osv-plugin
          path: build/libs/

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/libs/*.jar
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "Release ${{ steps.get_version.outputs.version }}"
          body: |
            ### OSV Vulnerability Scanner Plugin
            
            ### Installation
            1. Open IntelliJ IDEA
            2. Go to Settings/Preferences → Plugins
            3. Click the gear icon → Install Plugin from Disk
            4. Select the downloaded `.jar` file
            5. Restart IntelliJ IDEA
            
            ### Features
            - Real-time vulnerability scanning for Maven, Gradle, npm, and pip dependencies
            - License detection and compliance checking
            - SARIF export for compliance reporting
            - Multi-database support (OSV, NVD, GitHub Advisory)
            - Branch comparison to highlight new issues
            
            ### Requirements
            - IntelliJ IDEA 2019.3 or later
            - Java 17 or later
            
            ### License
            Apache 2.0
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-draft:
    name: Draft Release (Main Branch)
    runs-on: ubuntu-latest
    needs: [build, test, verify]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: osv-plugin
          path: build/libs/

      - name: Get next version
        id: get_version
        run: |
          VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/libs/*.jar
          tag_name: draft-${{ steps.get_version.outputs.version }}
          name: "Draft Release ${{ steps.get_version.outputs.version }}"
          body: |
            ### OSV Vulnerability Scanner Plugin - Draft Release
            
            This is a draft release for testing purposes.
            
            ### Installation
            1. Open IntelliJ IDEA
            2. Go to Settings/Preferences → Plugins
            3. Click the gear icon → Install Plugin from Disk
            4. Select the downloaded `.jar` file
            5. Restart IntelliJ IDEA
            
            ### Features
            - Real-time vulnerability scanning for Maven, Gradle, npm, and pip dependencies
            - License detection and compliance checking
            - SARIF export for compliance reporting
            - Multi-database support (OSV, NVD, GitHub Advisory)
            - Branch comparison to highlight new issues
            
            ### Requirements
            - IntelliJ IDEA 2019.3 or later
            - Java 17 or later
            
            ### License
            Apache 2.0
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-snapshot:
    name: Build Snapshot
    runs-on: ubuntu-latest
    needs: [build, test, verify]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: osv-plugin
          path: build/libs/

      - name: Get snapshot version
        id: get_version
        run: |
          VERSION="snapshot-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: osv-plugin-snapshot-${{ steps.get_version.outputs.version }}
          path: build/libs/*.jar
          retention-days: 30
